<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern "I" with beam effect -->
  <rect x="45" y="20" width="8" height="80" fill="url(#gradient1)" rx="4"/>
  <rect x="65" y="20" width="8" height="80" fill="url(#gradient2)" rx="4"/>
  
  <!-- Top beam -->
  <path d="M 35 30 Q 60 25 85 30" stroke="url(#beamGradient)" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Middle beam -->
  <path d="M 40 60 Q 60 55 80 60" stroke="url(#beamGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Bottom beam -->
  <path d="M 35 90 Q 60 85 85 90" stroke="url(#beamGradient)" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Info dot -->
  <circle cx="60" cy="35" r="6" fill="url(#gradient3)"/>
  
  <defs>
    <linearGradient id="gradient1" x1="49" y1="20" x2="49" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="69" y1="20" x2="69" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gradient3" x1="60" y1="29" x2="60" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="beamGradient" x1="35" y1="0" x2="85" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#60A5FA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
